# Netlify deployment configuration for Lukupäiväkirja (Vite SPA)

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route that isn't a real static file is served index.html,
# so client-side routes like /kirja/:id survive a hard refresh or deep link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
